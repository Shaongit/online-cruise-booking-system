<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Payments')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-0">
      <div th:replace="~{fragments/layout :: sidebar('payments')}"></div>
    </div>
    <main class="col-md-10 p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-semibold mb-0">
          <i class="bi bi-credit-card me-2 text-primary"></i>Payment Transactions
          <small th:if="${bookingId}" class="text-muted fs-6">
            &mdash; Booking #<span th:text="${bookingId}"></span>
          </small>
        </h2>
        <a th:href="@{/bookings}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back to Bookings
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Booking #</th>
                  <th>Amount</th>
                  <th>Currency</th>
                  <th>Method</th>
                  <th>Card (Last 4)</th>
                  <th>Status</th>
                  <th>Transaction Date</th>
                  <th>Gateway Ref</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="p : ${payments}">
                  <td th:text="${p.transactionId}"></td>
                  <td>
                    <a th:if="${p.booking != null}"
                       th:href="@{/payments/booking/{id}(id=${p.booking.bookingId})}"
                       th:text="'#' + ${p.booking.bookingId}"></a>
                    <span th:if="${p.booking == null}">-</span>
                  </td>
                  <td class="fw-semibold" th:text="'$' + ${p.amount}"></td>
                  <td th:text="${p.currency != null ? p.currency : 'CAD'}"></td>
                  <td th:text="${p.paymentMethod}"></td>
                  <td th:text="${p.cardLastFour != null ? '&#x2022;&#x2022;&#x2022;&#x2022; ' + p.cardLastFour : '-'}"></td>
                  <td>
                    <span class="badge"
                          th:classappend="${p.transactionStatus == 'COMPLETED'} ? 'bg-success' : (${p.transactionStatus == 'FAILED'} ? 'bg-danger' : 'bg-warning text-dark')"
                          th:text="${p.transactionStatus}"></span>
                  </td>
                  <td th:text="${p.transactionDate != null ? #temporals.format(p.transactionDate, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                  <td th:text="${p.paymentGatewayRef != null ? p.paymentGatewayRef : '-'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(payments)}">
                  <td colspan="9" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>No payment transactions found.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
